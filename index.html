<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura Coach</title>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Fredoka:wght@600;700&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#0b112d',
              purpleAccent: '#8a56e2',
              tealAccent: '#4ed9cc',
              goldAura: '#f9c874',
              glassBg: 'rgba(255, 255, 255, 0.05)',
              glassBorder: 'rgba(255, 255, 255, 0.1)',
              "primary": "#4ed9cc",
              "background-light": "#f8f6f6",
              "background-dark": "#0b112d",
              "accent-purple": "#8a56e2",
              "highlight-gold": "#f9c874",
              "navy-muted": "#1a2347",
              brand: {
                50: '#ecfeff',
                100: '#cffafe',
                200: '#a5f3fc',
                300: '#67e8f9',
                400: '#22d3ee',
                500: '#4ed9cc', // Updated to tealAccent
                600: '#0891b2',
                700: '#0e7490',
                800: '#155e75',
                900: '#164e63',
              },
              score: {
                high: '#4ed9cc', // tealAccent
                med: '#f9c874', // goldAura
                low: '#ef4444'
              }
            },
            fontFamily: {
              sans: ['"Be Vietnam Pro"', 'sans-serif'],
              display: ['"Be Vietnam Pro"', 'sans-serif'],
              fredoka: ['"Fredoka"', 'sans-serif'],
            },
            borderRadius: {
              'twelve': '12px',
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "1rem",
              "2xl": "1.5rem",
              "full": "9999px"
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for chat feel */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
      }
      .gradient-text {
        background: linear-gradient(135deg, #4ed9cc, #8a56e2);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .glow-teal {
        box-shadow: 0 0 20px rgba(78, 217, 204, 0.15);
      }
      
      body {
          font-family: 'Be Vietnam Pro', sans-serif;
          background-color: #0b112d;
      }
      .glass-panel {
          background: rgba(26, 35, 71, 0.4);
          backdrop-filter: blur(12px);
          border: 1px solid rgba(78, 217, 204, 0.1);
      }
      .message-ai {
          background: rgba(26, 35, 71, 0.8);
          border-left: 3px solid #4ed9cc;
      }
      .message-user {
          background: linear-gradient(135deg, #8a56e2 0%, #4ed9cc 100%);
      }
      .custom-scrollbar::-webkit-scrollbar {
          width: 5px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(78, 217, 204, 0.2);
          border-radius: 10px;
      }
      @keyframes spin-y {
        from { transform: rotateY(0deg); }
        to { transform: rotateY(360deg); }
      }
      .animate-spin-y {
        animation: spin-y 10s linear infinite;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.564.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased overflow-hidden">
    <div id="root" class="h-screen w-full flex flex-col"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
